name: Deploy to GitHub Pages

# Veröffentlicht die statische Website automatisch bei jedem Push auf main.
# Voraussetzung: In Settings -> Pages -> "Build and deployment" -> Source
# auf "GitHub Actions" stellen (statt "Deploy from a branch").

on:
  push:
    branches: [main]
  workflow_dispatch:   # erlaubt manuelles Auslösen im Actions-Tab

permissions:
  contents: read
  pages: write
  id-token: write

# Immer nur ein Deployment gleichzeitig, laufende nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (gesamte Website)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # kompletter Repo-Inhalt = die fertige Seite

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
