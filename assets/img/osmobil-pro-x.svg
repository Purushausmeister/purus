<svg viewBox="0 0 460 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mobile Osmoseanlage OSMOBIL PRO X">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2f8"/><stop offset="0.5" stop-color="#cdd6e4"/><stop offset="1" stop-color="#aeb9cb"/>
    </linearGradient>
    <linearGradient id="cyl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c6d0df"/><stop offset="0.5" stop-color="#eef3fa"/><stop offset="1" stop-color="#b3becd"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="460" height="340" rx="22" fill="#eef2f9"/>
  <ellipse cx="230" cy="304" rx="168" ry="16" fill="#dbe3f0"/>
  <!-- Rahmen / Griff -->
  <path d="M318 96 q46 -6 46 34 l0 118" fill="none" stroke="#7b8798" stroke-width="9" stroke-linecap="round"/>
