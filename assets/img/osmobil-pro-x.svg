  <rect x="128" y="96" width="196" height="158" rx="16" fill="url(#steel)" stroke="#93a0b3" stroke-width="2"/>
  <!-- Bedienpanel -->
  <rect x="150" y="112" width="152" height="60" rx="9" fill="#22314d"/>
  <!-- TDS-Display -->
  <rect x="164" y="124" width="70" height="34" rx="5" fill="#0e6b4c"/>
  <text x="199" y="146" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#7dffc4" text-anchor="middle">000 ppm</text>
  <text x="199" y="167" font-family="Arial, sans-serif" font-size="8" fill="#9fb4c9" text-anchor="middle">TDS</text>
  <!-- Regler -->
  <circle cx="258" cy="134" r="10" fill="#5b6270"/>
  <circle cx="284" cy="134" r="10" fill="#5b6270"/>
  <circle cx="258" cy="134" r="3" fill="#cfd8e6"/><circle cx="284" cy="134" r="3" fill="#cfd8e6"/>
  <!-- Membran-/Filterzylinder -->
  <rect x="146" y="182" width="30" height="66" rx="13" fill="url(#cyl)" stroke="#93a0b3" stroke-width="1.5"/>
  <rect x="182" y="182" width="30" height="66" rx="13" fill="url(#cyl)" stroke="#93a0b3" stroke-width="1.5"/>
  <!-- Reinstwasser-Schlauch (Coil) -->
  <circle cx="272" cy="210" r="30" fill="none" stroke="#4aa3e0" stroke-width="8"/>
  <circle cx="272" cy="210" r="17" fill="none" stroke="#4aa3e0" stroke-width="8"/>
  <!-- Räder -->
  <circle cx="168" cy="262" r="22" fill="#2f333c"/><circle cx="168" cy="262" r="8" fill="#5b6270"/>
  <circle cx="286" cy="262" r="22" fill="#2f333c"/><circle cx="286" cy="262" r="8" fill="#5b6270"/>
  <!-- Wassertropfen-Badge -->
  <g transform="translate(360,150)">
    <path d="M0 -30 C 20 -6 26 6 26 16 A26 26 0 1 1 -26 16 C -26 6 -20 -6 0 -30 Z" fill="#4aa3e0"/>
