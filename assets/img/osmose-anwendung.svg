<svg viewBox="0 0 460 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reinstwasser-Reinigung von Solarmodulen und Glas mit Teleskopstange">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcebfb"/><stop offset="1" stop-color="#eef2f9"/>
    </linearGradient>
    <linearGradient id="pv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b4a7a"/><stop offset="1" stop-color="#1c3358"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="460" height="340" rx="22" fill="url(#sky)"/>
  <ellipse cx="230" cy="312" rx="180" ry="14" fill="#dbe3f0"/>
  <!-- Solarmodul (leicht gekippt) -->
  <g transform="translate(60,70) rotate(-8)">
    <rect x="0" y="0" width="250" height="150" rx="6" fill="url(#pv)" stroke="#16273f" stroke-width="4"/>
    <!-- Zellenraster -->
    <g stroke="#4f6f9e" stroke-width="2" opacity="0.8">
      <line x1="62" y1="6" x2="62" y2="144"/><line x1="125" y1="6" x2="125" y2="144"/><line x1="188" y1="6" x2="188" y2="144"/>
      <line x1="6" y1="50" x2="244" y2="50"/><line x1="6" y1="100" x2="244" y2="100"/>
    </g>
    <!-- Glanz / sauber -->
    <path d="M20 20 L70 20 L30 130 L10 130 Z" fill="#ffffff" opacity="0.14"/>
    <path d="M150 16 L172 16 L120 140 L104 140 Z" fill="#ffffff" opacity="0.10"/>
  </g>
  <!-- Sparkles (sauberes Ergebnis) -->
  <g fill="#f5b301">
    <path d="M110 74 l5 12 12 5 -12 5 -5 12 -5 -12 -12 -5 12 -5 z"/>
    <path d="M250 60 l3.5 8 8 3.5 -8 3.5 -3.5 8 -3.5 -8 -8 -3.5 8 -3.5 z"/>
  </g>
  <!-- Teleskopstange (Carbon/blau) -->
  <line x1="300" y1="300" x2="230" y2="120" stroke="#33517F" stroke-width="10" stroke-linecap="round"/>
  <line x1="300" y1="300" x2="230" y2="120" stroke="#5b7fb8" stroke-width="10" stroke-linecap="round" stroke-dasharray="2 30"/>
  <!-- Bürstenkopf -->
  <g transform="translate(228,118) rotate(-8)">
    <rect x="-34" y="-14" width="68" height="16" rx="4" fill="#22314d"/>
    <g stroke="#7fa8dd" stroke-width="3" stroke-linecap="round">
      <line x1="-28" y1="2" x2="-28" y2="16"/><line x1="-18" y1="2" x2="-18" y2="17"/><line x1="-8" y1="2" x2="-8" y2="16"/>
      <line x1="2" y1="2" x2="2" y2="17"/><line x1="12" y1="2" x2="12" y2="16"/><line x1="22" y1="2" x2="22" y2="17"/><line x1="30" y1="2" x2="30" y2="16"/>
    </g>
  </g>
  <!-- Reinstwasser-Tropfen -->
  <g fill="#4aa3e0">
    <circle cx="215" cy="150" r="4"/><circle cx="235" cy="165" r="3"/><circle cx="205" cy="180" r="3.5"/><circle cx="245" cy="195" r="3"/>
  </g>
</svg>
